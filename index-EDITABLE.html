function setInic(id,v){ state[id].inicial=v; renderCalc(id); }
function setPlazo(id,p){ state[id].plazo=p; renderCalc(id); }
function autoPlan(id){
  const p=planById(id);
  state[id]={ inicial:p.inicialOpts[p.recIdx], plazo:12, auto:true };
  renderCalc(id);
}

function renderCalc(id){
  const p=planById(id), st=state[id];
  document.querySelectorAll(`#inic-${id} button`).forEach(b=>b.classList.toggle('on', Number(b.getAttribute('data-v'))===st.inicial));
  document.querySelectorAll(`#plazo-${id} button`).forEach(b=>{
    const dp=b.getAttribute('data-p');
    b.classList.toggle('on', (dp==='contado' && st.plazo==='contado') || Number(dp)===st.plazo);
  });
  const res=$('res-'+id), c=p.consulta;
  if(st.plazo==='contado'){
    res.innerHTML = `<div class="m ok">${money(p.colocacion)}</div>
      <div class="d">Pago único de tu bracket 🎉</div>
      <div class="d" style="margin-top:.35rem">Durante tu tratamiento pagas <b>solo ${money(c)}</b> por consulta (aprox. 1 al mes).</div>`;
  }else{
    const mm=mensual(p, st.inicial, st.plazo);
    const totalMes=mm + c;
    res.innerHTML = `${st.auto?'<div class="rec">✨ Nuestra recomendación para ti</div>':''}
      <div class="m">${money(totalMes)}<small>/mes</small></div>
      <div class="d">tu bracket ${money(mm)} + tu consulta ${money(c)} <span style="color:var(--gris-cl)">(1 al mes)</span></div>
      <div class="d">${money(st.inicial)} de inicial · durante ${st.plazo} meses</div>
      <div class="ahorro" style="color:var(--gris)">Al terminar de pagar tu bracket, pagas solo ${money(c)} por consulta hasta terminar.</div>`;
  }
}

/* ---------- Detalle del plan para el lead ---------- */
function detallePlan(sel){
  if(sel==='esencial') return `Plan Esencial · ${money(CONFIG.estandar.precioMes)}/mes (hasta terminar tratamiento).`;
  if(sel==='general')  return `Quiere una valoración / asesoría para elegir su plan.`;
  const p=planById(sel), st=state[sel];
  if(!p) return 'Valoración general.';
  const c=p.consulta;
  if(st.plazo==='contado')
    return `${p.nombre} · bracket ${money(p.colocacion)} de CONTADO. Durante tratamiento: solo ${money(c)} por consulta (~1 al mes).`;
  const mm=mensual(p, st.inicial, st.plazo);
  return `${p.nombre} · bracket ${money(p.colocacion)}: inicial ${money(st.inicial)} + ${st.plazo} pagos de ${money(mm)}. Con consulta = ${money(mm+c)}/mes durante ${st.plazo} meses; después solo ${money(c)} por consulta hasta terminar.`;
}
function tituloPlan(sel){
  if(sel==='esencial') return 'Plan Esencial';
  if(sel==='general')  return 'Valoración';
  const p=planById(sel); return p?p.nombre:'Valoración';
}

  $('overlay').classList.add('show');

function cerrarModal(){ $('overlay').classList.remove('show'); document.body.style.overflow=''; }

async function enviarLead(ev){
  ev.preventDefault();
  const f=ev.target, btn=$('btnEnviar'), msg=$('formMsg');
  msg.className='form-msg'; msg.textContent='';
  const nombre=f.nombre.value.trim(), correo=f.correo.value.trim(), whats=f.whatsapp.value.trim();
  if(f.botcheck.checked) return false; // honeypot
  if(!nombre || !correo){ msg.classList.add('err'); msg.textContent='Escribe tu nombre y correo, por favor.'; return false; }
  btn.disabled=true; btn.textContent='Enviando...';

  const sel=window._sel;
  const payload={
    access_key: CONFIG.web3formsKey,
    subject: `🦷 Nuevo lead Smile Plan — ${tituloPlan(sel)}`,
    from_name: `Smile Plan · ${CONFIG.clinica}`,
    "Plan de interés": tituloPlan(sel),
    "Detalle del plan": detallePlan(sel),
    "Nombre del paciente": nombre,
    "Correo": correo,
    "WhatsApp": whats || "No proporcionado",
    botcheck: false
  };
  try{
    const r=await fetch('https://api.web3forms.com/submit',{
      method:'POST', headers:{'Content-Type':'application/json', Accept:'application/json'},
      body: JSON.stringify(payload)
    });
    const data=await r.json();
    if(data.success){
      const waMsg=encodeURIComponent(`Hola, soy ${nombre}. Envié mi plan (${tituloPlan(sel)}) desde su página y quiero agendar mi valoración.`);
      $('modal').innerHTML = `
        <div class="exito">
          <div class="big">🎉</div>
          <h4>¡Listo, ${nombre.split(' ')[0]}!</h4>
          <p>Recibimos tu plan. Te contactamos muy pronto para agendar tu valoración.</p>
          <a class="wa2" href="https://wa.me/${CONFIG.whatsapp}?text=${waMsg}" target="_blank" rel="noopener">
            <svg class="smiley" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.7 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8s.7-2 .9-2.2c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.3.3c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.4.1.6-.1l.8-1c.2-.2.4-.2.6-.1l1.8.9c.3.1.4.2.5.3.1.2.1.7-.1 1.3z"/></svg>
            O escríbenos ya por WhatsApp
          </a>
          <div style="margin-top:1rem"><button class="cerrar" style="width:auto;padding:.5rem 1.2rem;border-radius:11px" onclick="cerrarModal()">Cerrar</button></div>
        </div>`;
    }else{
      throw new Error(data.message||'error');
    }
  }catch(err){
    btn.disabled=false; btn.textContent='Recibir mi plan y que me contacten';
    msg.classList.add('err');
    msg.innerHTML = `No se pudo enviar. Revisa tu internet e intenta de nuevo, o <a href="https://wa.me/${CONFIG.whatsapp}" target="_blank" rel="noopener" style="color:var(--azul);font-weight:700">escríbenos por WhatsApp</a>.`;
  }
  return false;
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') cerrarModal(); });
init();
</script>
</body>
</html>
