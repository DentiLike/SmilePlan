/* ============================================================
   Smile Plan · Dentilike — cotizador público
   Esencial $499/mes = gancho. Flex Premium ($4,500) y
   Flex Interactive ($6,000) cotizables a 3/6/12 o contado,
   con inicial elegible + botón automático. Lead por Web3Forms
   al correo (limpio, sin que lo alteren).
   ============================================================ */
:root{
  --azul:#1f5b9e; --azul-osc:#14406e; --azul-claro:#eff6ff;
  --tinta:#0f172a; --gris:#64748b; --gris-cl:#94a3b8;
  --borde:#e2e8f0; --ok:#059669; --ambar:#f59e0b; --rojo:#dc2626;
  --oro:#d4a72c; --fondo:#f6f8fb; --sombra:0 8px 24px rgba(15,23,42,.08);
}
*{box-sizing:border-box; margin:0; padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif; background:var(--fondo); color:var(--tinta); line-height:1.5; -webkit-font-smoothing:antialiased; padding-bottom:96px}
img{max-width:100%; display:block}
button{font-family:inherit; cursor:pointer; border:none}
input{font-family:inherit}
h1,h2,h3{line-height:1.15}

.hero{background:linear-gradient(135deg,#fff 0%,#eaf2fb 100%); border-bottom:1px solid var(--borde); text-align:center; padding:2.2rem 1.2rem 1.6rem}
.hero img{height:52px; margin:0 auto .9rem}
.hero h1{font-family:'Fredoka'; font-weight:700; font-size:clamp(1.7rem,5.4vw,2.5rem); color:var(--azul)}
.hero .desde{font-family:'Fredoka'; font-weight:600; color:var(--azul-osc); font-size:clamp(1rem,3.6vw,1.25rem); margin-top:.5rem}
.hero .desde b{color:var(--azul); font-size:1.35em}
.hero p{color:var(--gris); margin-top:.5rem; font-size:.95rem; max-width:440px; margin:.5rem auto 0}
.hero .paso{display:inline-flex; gap:.5rem; margin-top:1rem; font-size:.8rem; color:var(--gris); background:#fff; border:1px solid var(--borde); padding:.45rem .9rem; border-radius:999px; box-shadow:var(--sombra); align-items:center}
.hero .paso b{color:var(--azul)}

.intro{max-width:760px; margin:1.3rem auto 0; padding:0 1rem}
.intro .card{background:#fff; border:1px solid var(--borde); border-radius:16px; padding:1.1rem 1.2rem; box-shadow:0 1px 2px rgba(15,23,42,.04)}
.intro h2{font-family:'Fredoka'; font-weight:600; color:var(--azul-osc); font-size:1.05rem; display:flex; gap:.5rem; align-items:center; margin-bottom:.4rem}
.intro p{font-size:.9rem; color:var(--gris)}

.wrap{max-width:760px; margin:0 auto; padding:1.4rem 1rem 2rem}
.seccion-tit{font-family:'Fredoka'; font-weight:600; color:var(--azul-osc); font-size:1.15rem; margin:1.6rem .2rem .8rem; display:flex; align-items:center; gap:.5rem}

.hero-plan{background:linear-gradient(135deg,var(--azul),var(--azul-osc)); color:#fff; border-radius:22px; padding:1.6rem 1.4rem; box-shadow:0 12px 30px rgba(31,91,158,.28); position:relative; overflow:hidden}
.hero-plan::after{content:""; position:absolute; right:-40px; top:-40px; width:160px; height:160px; background:rgba(255,255,255,.07); border-radius:50%}
.hero-plan .etq{display:inline-block; background:var(--oro); color:#3a2c00; font-size:.66rem; font-weight:800; padding:3px 11px; border-radius:8px; letter-spacing:.04em; text-transform:uppercase; margin-bottom:.6rem}
.hero-plan h3{font-family:'Fredoka'; font-weight:600; font-size:1.35rem}
.hero-plan .precio{font-family:'Fredoka'; font-weight:700; font-size:2.8rem; line-height:1; margin:.4rem 0 .1rem}
.hero-plan .precio span{font-size:1rem; font-weight:500; opacity:.85}
.hero-plan .sub{font-size:.86rem; opacity:.9; margin-bottom:.9rem}
.hero-plan ul{list-style:none; display:grid; gap:.4rem; margin-bottom:1.1rem; position:relative; z-index:1}
.hero-plan li{font-size:.9rem; display:flex; gap:.5rem; align-items:flex-start}
.hero-plan li svg{flex-shrink:0; margin-top:2px}
.hero-plan .cta{width:100%; background:#fff; color:var(--azul); font-weight:800; font-size:1rem; padding:.9rem; border-radius:14px; position:relative; z-index:1}

function mensual(p, inicial, plazo){ return ceilR((p.colocacion - inicial)/plazo); }

function init(){
  $('logo').src = LOGO;
  $('dentiLogo').src = DENTI_LOGO;
  $('heroPrecio').textContent = money(CONFIG.estandar.precioMes);
  $('subtitulo').textContent = CONFIG.subtitulo;
  $('pieClinica').innerHTML = `${CONFIG.clinica} · <a href="${CONFIG.mapsUrl}" target="_blank" rel="noopener" style="color:var(--azul);text-decoration:none">${CONFIG.direccion}</a><br>${CONFIG.doctor.nombre} · Céd. Prof. ${CONFIG.doctor.cedula}<br>Permiso de publicidad COFEPRIS: ${CONFIG.cofepris}`;

  // Héroe
  const e = CONFIG.estandar;
  $('heroPlan').innerHTML = `
    <div class="br-hero">${BR_ESENCIAL}</div>
    <span class="etq">★ ${e.etiqueta}</span>
    <h3>${e.nombre}</h3>
    <div class="precio">${money(e.precioMes)}<span>/mes</span></div>
    <div class="sub">hasta terminar tu tratamiento · sin enganche</div>
    <ul>${e.beneficios.map(b=>`<li>${CHECK}<span>${b}</span></li>`).join('')}</ul>
    <button class="cta" onclick="abrirModal('esencial')">Me interesa el ${e.nombre}</button>`;

  // Flex cards
  $('tiers').innerHTML = CONFIG.flex.map(p=>{
    state[p.id] = { inicial:p.inicialOpts[p.recIdx], plazo:12 }; // recomendación por defecto
    return tarjetaFlex(p);
  }).join('');
  CONFIG.flex.forEach(p=>renderCalc(p.id));
  renderCompara();

  $('aclara').innerHTML = `<ul>${CONFIG.aclaraciones.map(t=>`<li>${t}</li>`).join('')}</ul>`;
  $('geoStrip').innerHTML = `<span>Estudios de diagnóstico a precio especial, en colaboración con</span><img src="${GEO_LOGO}" alt="GEO · Gabinete Radiológico Dental"/>`;
}

function tarjetaFlex(p){
  const ico = p.id==='premium' ? BR_PREMIUM : BR_INTERACTIVE;
  return `<div class="tier calc ${p.top?'top':''}">
    <div class="tier-head">
      <div class="tier-head-l">
        <span class="badge ${p.badgeTipo}">${p.badge}</span>
        <h3>${p.nombre}</h3>
      </div>
      <div class="br-ico ${p.top?'oro':''}">${ico}</div>
    </div>
    <div class="tiempo">${CLOCK} ${p.tiempo}</div>
    <ul>${p.beneficios.map(x=>`<li>${CHECKB}<span><b>${x.b}</b> — ${x.t}</span></li>`).join('')}</ul>
    ${p.nota?`<div class="nota-caso">ℹ️ ${p.nota}</div>`:''}
    <div class="calc-box">
      <div class="costo">Colocación del bracket: <b>${money(p.colocacion)}</b></div>
      <div class="lbl"><span>Tu pago inicial</span>
        <button class="auto-btn" onclick="autoPlan('${p.id}')">✨ Mi mejor plan</button></div>
      <div class="chips" id="inic-${p.id}">
        ${p.inicialOpts.map(v=>`<button data-v="${v}" onclick="setInic('${p.id}',${v})">${money(v)}</button>`).join('')}
      </div>
      <div class="lbl" style="margin-top:.6rem">¿En cuántos meses lo pagas?</div>
      <div class="chips" id="plazo-${p.id}">
        ${p.plazos.map(m=>`<button data-p="${m}" onclick="setPlazo('${p.id}',${m})">${m}<small>meses</small></button>`).join('')}
        <button class="contado" data-p="contado" onclick="setPlazo('${p.id}','contado')">Contado<small>1 pago</small></button>
      </div>
      <div class="calc-res" id="res-${p.id}"></div>
      <div class="consulta-line">${CLOCK}<span>Consultas de control: <b>${money(p.consulta)}</b> por visita, aparte. Al liquidar tu bracket, solo continúas con tus consultas.</span></div>
    </div>
    <button class="cotiza" onclick="abrirModal('${p.id}')">Recibir este plan y agendar ›</button>
  </div>`;
}

    <div class="doc-card">

function renderCompara(){
  const e=CONFIG.estandar, pr=planById('premium'), it=planById('interactive'), t=CONFIG.tiempos;
  const tm = n => { const x=t.find(o=>o.n===n); return x?`${x.min}–${x.max} m`:''; };
  const rows=[
    ['Tiempo', tm('Esencial'), `<span class="hi">${tm('Premium')}</span>`, `<span class="hi">${tm('Interactive')} ⚡</span>`],
    ['Material','Estándar','Premium glide steel','Autoligado interactivo'],
    ['Bracket',`Incluido`, money(pr.colocacion), money(it.colocacion)],
    ['Consultas',`Incluidas en ${money(e.precioMes)}`, `${money(pr.consulta)} c/u`, `${money(it.consulta)} c/u`],
    ['Molestias / despegados','Estándar','<span class="ok">✓ Menos</span>','<span class="ok">✓✓ Mínimas</span>']
  ];
  $('comparaBox').innerHTML = `
    <table>
      <thead><tr>
        <th class="rowlbl"></th>
        <th>Esencial</th>
        <th class="col-flex">Flex Premium</th>
        <th class="col-star"><span class="starbadge">★ RECO</span>Flex Interactive</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td class="rowlbl">${r[0]}</td>
          <td>${r[1]}</td>
          <td class="col-flex">${r[2]}</td>
          <td class="col-star">${r[3]}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="foot-compara">El bracket Flex se paga a 3, 6 o 12 meses, o de contado. Las consultas de control (${money(pr.consulta)}) aplican en los tres planes.</div>
    <div class="remate">✨ Terminas en la mitad del tiempo, con mejor material y menos molestias.</div>`;
}
function setInic(id,v){ state[id].inicial=v; renderCalc(id); }
function setPlazo(id,p){ state[id].plazo=p; renderCalc(id); }
function autoPlan(id){
  const p=planById(id);
  state[id]={ inicial:p.inicialOpts[p.recIdx], plazo:12, auto:true };
  renderCalc(id);
}

function renderCalc(id){
  const p=planById(id), st=state[id];
  document.querySelectorAll(`#inic-${id} button`).forEach(b=>b.classList.toggle('on', Number(b.getAttribute('data-v'))===st.inicial));
  document.querySelectorAll(`#plazo-${id} button`).forEach(b=>{
    const dp=b.getAttribute('data-p');
    b.classList.toggle('on', (dp==='contado' && st.plazo==='contado') || Number(dp)===st.plazo);
  });
  const res=$('res-'+id), c=p.consulta;
  if(st.plazo==='contado'){
    res.innerHTML = `<div class="m ok">${money(p.colocacion)}</div>
      <div class="d">Pago único de tu bracket 🎉</div>
      <div class="d" style="margin-top:.35rem">Durante tu tratamiento pagas <b>solo ${money(c)}</b> por consulta (aprox. 1 al mes).</div>`;
  }else{
    const mm=mensual(p, st.inicial, st.plazo);
    const totalMes=mm + c;
    res.innerHTML = `${st.auto?'<div class="rec">✨ Nuestra recomendación para ti</div>':''}
      <div class="m">${money(totalMes)}<small>/mes</small></div>
      <div class="d">tu bracket ${money(mm)} + tu consulta ${money(c)} <span style="color:var(--gris-cl)">(1 al mes)</span></div>
      <div class="d">${money(st.inicial)} de inicial · durante ${st.plazo} meses</div>
      <div class="ahorro" style="color:var(--gris)">Al terminar de pagar tu bracket, pagas solo ${money(c)} por consulta hasta terminar.</div>`;
  }
}

/* ---------- Detalle del plan para el lead ---------- */
function detallePlan(sel){
  if(sel==='esencial') return `Plan Esencial · ${money(CONFIG.estandar.precioMes)}/mes (hasta terminar tratamiento).`;
  if(sel==='general')  return `Quiere una valoración / asesoría para elegir su plan.`;
  const p=planById(sel), st=state[sel];
  if(!p) return 'Valoración general.';
  const c=p.consulta;
  if(st.plazo==='contado')
    return `${p.nombre} · bracket ${money(p.colocacion)} de CONTADO. Durante tratamiento: solo ${money(c)} por consulta (~1 al mes).`;
  const mm=mensual(p, st.inicial, st.plazo);
  return `${p.nombre} · bracket ${money(p.colocacion)}: inicial ${money(st.inicial)} + ${st.plazo} pagos de ${money(mm)}. Con consulta = ${money(mm+c)}/mes durante ${st.plazo} meses; después solo ${money(c)} por consulta hasta terminar.`;
}
function tituloPlan(sel){
  if(sel==='esencial') return 'Plan Esencial';
  if(sel==='general')  return 'Valoración';
  const p=planById(sel); return p?p.nombre:'Valoración';
}

/* ---------- Modal + formulario ---------- */
function abrirModal(sel){
  window._sel=sel;
  const det=detallePlan(sel);
  $('modal').innerHTML = `
    <div class="top"><img src="${LOGO}" alt="Smile Plan"/>
      <button class="cerrar" onclick="cerrarModal()" aria-label="Cerrar">✕</button></div>
    <h3>Recibe tu plan y agenda</h3>
    <p class="lead">Déjanos tus datos y te contactamos para tu <b>valoración con estudios</b> (${money(CONFIG.valoracion.precio)}), que incluye ${CONFIG.valoracion.incluye}.</p>
    <div class="geo-row"><span>Estudios a precio especial, en colaboración con</span><img src="${GEO_LOGO}" alt="GEO"/></div>
    <div class="plan-sum">📋 <b>${tituloPlan(sel)}</b><br>${det}</div>
    <form id="leadForm" onsubmit="return enviarLead(event)">
      <div class="field"><label>Tu nombre *</label>
        <input name="nombre" required autocomplete="name" placeholder="Nombre y apellido"/></div>
      <div class="field"><label>Tu correo *</label>
        <input name="correo" type="email" required autocomplete="email" placeholder="tucorreo@ejemplo.com"/></div>
      <div class="field"><label>Tu WhatsApp (opcional)</label>
        <input name="whatsapp" inputmode="tel" autocomplete="tel" placeholder="10 dígitos"/></div>
      <input type="checkbox" name="botcheck" class="hp" tabindex="-1" autocomplete="off"/>
      <button type="submit" class="enviar" id="btnEnviar">Recibir mi plan y que me contacten</button>
      <div class="form-msg" id="formMsg"></div>
    </form>
    <div class="nota-legal">
      Al enviar, aceptas que ${CONFIG.clinica} use tus datos para contactarte sobre tu tratamiento. No los compartimos con terceros.<br>
      La valoración con estudios (${money(CONFIG.valoracion.precio)}) no es reembolsable por ser un servicio profesional prestado. Precios sujetos a valoración clínica.<br>
      Permiso de publicidad COFEPRIS: ${CONFIG.cofepris}
    </div>`;
  $('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function cerrarModal(){ $('overlay').classList.remove('show'); document.body.style.overflow=''; }

async function enviarLead(ev){
  ev.preventDefault();
  const f=ev.target, btn=$('btnEnviar'), msg=$('formMsg');
  msg.className='form-msg'; msg.textContent='';
  const nombre=f.nombre.value.trim(), correo=f.correo.value.trim(), whats=f.whatsapp.value.trim();
  if(f.botcheck.checked) return false; // honeypot
  if(!nombre || !correo){ msg.classList.add('err'); msg.textContent='Escribe tu nombre y correo, por favor.'; return false; }
  btn.disabled=true; btn.textContent='Enviando...';

  const sel=window._sel;
  const payload={
    access_key: CONFIG.web3formsKey,
    subject: `🦷 Nuevo lead Smile Plan — ${tituloPlan(sel)}`,
    from_name: `Smile Plan · ${CONFIG.clinica}`,
    "Plan de interés": tituloPlan(sel),
    "Detalle del plan": detallePlan(sel),
    "Nombre del paciente": nombre,
    "Correo": correo,
    "WhatsApp": whats || "No proporcionado",
    botcheck: false
  };
  try{
    const r=await fetch('https://api.web3forms.com/submit',{
      method:'POST', headers:{'Content-Type':'application/json', Accept:'application/json'},
      body: JSON.stringify(payload)
    });
    const data=await r.json();
    if(data.success){
      const waMsg=encodeURIComponent(`Hola, soy ${nombre}. Envié mi plan (${tituloPlan(sel)}) desde su página y quiero agendar mi valoración.`);
      $('modal').innerHTML = `
        <div class="exito">
          <div class="big">🎉</div>
          <h4>¡Listo, ${nombre.split(' ')[0]}!</h4>
          <p>Recibimos tu plan. Te contactamos muy pronto para agendar tu valoración.</p>
          <a class="wa2" href="https://wa.me/${CONFIG.whatsapp}?text=${waMsg}" target="_blank" rel="noopener">
            <svg class="smiley" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.7 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-.9-.3-1.6-.6-2.8-1.2-4.6-4-4.7-4.2-.1-.2-1.1-1.5-1.1-2.8s.7-2 .9-2.2c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.3.3c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.4.1.6-.1l.8-1c.2-.2.4-.2.6-.1l1.8.9c.3.1.4.2.5.3.1.2.1.7-.1 1.3z"/></svg>
            O escríbenos ya por WhatsApp
          </a>
          <div style="margin-top:1rem"><button class="cerrar" style="width:auto;padding:.5rem 1.2rem;border-radius:11px" onclick="cerrarModal()">Cerrar</button></div>
        </div>`;
    }else{
      throw new Error(data.message||'error');
    }
  }catch(err){
    btn.disabled=false; btn.textContent='Recibir mi plan y que me contacten';
    msg.classList.add('err');
    msg.innerHTML = `No se pudo enviar. Revisa tu internet e intenta de nuevo, o <a href="https://wa.me/${CONFIG.whatsapp}" target="_blank" rel="noopener" style="color:var(--azul);font-weight:700">escríbenos por WhatsApp</a>.`;
  }
  return false;
}

document.addEventListener('keydown', e=>{ if(e.key==='Escape') cerrarModal(); });
init();
</script>
